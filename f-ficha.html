<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha Técnica de Imóvel</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/g-global.css">
<style>
  :root {
    --bg:           #F5F3EE;
    --surface:      #FFFFFF;
    --surface2:     #F9F8F5;
    --border:       #E2DDD6;
    --border-strong:#C8C0B4;
    --text:         #1A1714;
    --text2:        #6B6560;
    --text3:        #9C958E;
    --accent:       #2B5F3E;
    --accent-light: #EAF2ED;
    --accent-border:#C3DBC9;
    --danger:       #C0392B;
    --danger-light: #FDF0EE;
    --radius:       10px;
    --shadow:       0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 100px; }

  /* ── CONTAINER ── */
  .container { max-width: 860px; margin: 0 auto; padding: 36px 24px; }

  /* ── SEÇÕES ── */
  .secao { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 24px; overflow: hidden; }
  .secao-header {
    background: var(--surface2); padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .secao-header.minimizavel {
    cursor: pointer; user-select: none;
    transition: background 0.15s;
    justify-content: space-between;
  }
  .secao-header.minimizavel:hover { background: #F0EDE8; }
  .secao-header-left { display: flex; align-items: center; gap: 12px; }
  .secao-arrow { font-size: 14px; color: var(--text3); transition: transform 0.25s; flex-shrink: 0; }
  .secao-arrow.aberto { transform: rotate(180deg); }
  .secao-body-wrap { overflow: hidden; transition: max-height 0.3s ease; }
  .secao-body { padding: 24px; }
  .secao-icone { width: 34px; height: 34px; background: var(--accent-light); color: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .secao-titulo { font-family: 'DM Serif Display', serif; font-size: 17px; font-weight: 400; }
  .secao-subtitulo { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* ── CAMPOS ── */
  .campo { margin-bottom: 16px; }
  .campo label { display: block; font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .campo input, .campo select { width: 100%; padding: 10px 13px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); transition: border-color 0.15s, box-shadow 0.15s; appearance: none; -webkit-appearance: none; }
  .campo input:focus, .campo select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(43,95,62,0.1); }
  .campo input[readonly] { background: var(--surface2); color: var(--text2); cursor: default; }
  .campo-vazio { border-color: #c0392b !important; background-color: #fff5f5 !important; }
  .comp-wrap { display: flex; gap: 6px; }
  .comp-wrap .select-wrap { flex: 2; min-width: 0; }
  .comp-wrap input { flex: 1; min-width: 0; width: auto; }
  .select-wrap { position: relative; }
  .select-wrap::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; font-size: 12px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

  /* ── ÁREA CALCULADA ── */
  .area-display { background: var(--accent-light); border: 1px solid var(--accent-border); border-radius: 8px; padding: 10px 13px; font-size: 15px; color: var(--accent); font-weight: 500; display: flex; align-items: center; gap: 5px; min-height: 41px; }
  .area-display small { font-size: 11px; font-weight: 400; color: #5A9470; }

  /* ── APELIDO ── */
  .apelido-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .apelido-wrap input { flex: 1; padding: 7px 11px; border: 1px dashed var(--border-strong); border-radius: 7px; font-size: 13px; font-style: italic; color: var(--text2); background: var(--surface2); font-family: 'DM Sans', sans-serif; }
  .apelido-wrap input:focus { outline: none; border-color: var(--accent); border-style: solid; }
  .apelido-label { font-size: 11px; color: var(--text3); white-space: nowrap; }

  /* ── CARTÕES DE CÔMODO ── */
  .comodo-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; transition: box-shadow 0.2s; }
  .comodo-card:hover { box-shadow: var(--shadow); }
  .comodo-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; transition: background 0.15s; }
  .comodo-header:hover { background: var(--surface2); }
  .comodo-header-left { display: flex; align-items: center; gap: 12px; }
  .comodo-num { width: 30px; height: 30px; background: var(--accent-light); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .comodo-nome { font-family: 'DM Serif Display', serif; font-size: 16px; font-weight: 400; }
  .comodo-progresso { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .comodo-acoes { display: flex; align-items: center; gap: 10px; }
  .badge-ok { background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--accent-border); }
  .badge-suite { background: #F0EAF8; color: #6B3FA0; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; border: 1px solid #D4B8F0; }
  .btn-remover { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--danger); cursor: pointer; transition: all 0.15s; }
  .btn-remover:hover { background: var(--danger-light); border-color: var(--danger); }
  .comodo-arrow { font-size: 16px; color: var(--text3); transition: transform 0.25s; }
  .comodo-arrow.aberto { transform: rotate(180deg); }
  .comodo-body { display: none; padding: 20px; animation: fadeIn 0.2s ease; }
  .comodo-body.aberto { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  /* Botão Limpar campos dentro do cômodo */
  .comodo-footer { margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
  .btn-limpar-comodo { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .btn-limpar-comodo:hover { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }

  /* ── BANHEIRO SUÍTE ── */
  .banheiro-grupo { margin-top: 20px; border: 1px solid #D4B8F0; border-radius: 8px; overflow: hidden; display: none; }
  .banheiro-grupo.visivel { display: block; }
  .banheiro-header { background: #F7F0FD; padding: 10px 16px; border-bottom: 1px solid #D4B8F0; font-size: 12px; font-weight: 500; color: #6B3FA0; text-transform: uppercase; letter-spacing: 0.07em; }
  .banheiro-body { padding: 16px; }

  /* ── DIVISOR DE GRUPO ── */
  .grupo-label { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  /* ── SELETOR DE TIPO DE AMBIENTE ── */
  .seletor-ambiente { margin-bottom: 4px; }
  .seletor-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); }
  .seletor-row .select-wrap { flex: 1; min-width: 160px; }
  .seletor-row input[type="text"] { flex: 1; min-width: 140px; border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); outline: none; }
  .seletor-row input[type="text"]:focus { border-color: var(--accent); }
  .btn-confirmar-amb { background: var(--accent); color: white; border: none; border-radius: var(--radius); padding: 10px 18px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .btn-confirmar-amb:hover { opacity: 0.88; }
  .btn-cancelar-amb { background: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text2); cursor: pointer; white-space: nowrap; }
  .btn-cancelar-amb:hover { background: var(--surface); }

  /* ── BOTÕES ── */
  .btn-adicionar { width: 100%; padding: 12px; border: 2px dashed var(--border-strong); border-radius: var(--radius); background: none; color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; margin-bottom: 8px; }
  .btn-adicionar:hover { border-color: var(--accent); background: var(--accent-light); }
  .btn-exportar { position: fixed; bottom: 28px; right: 28px; background: var(--accent); color: #fff; border: none; border-radius: 50px; padding: 15px 28px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 20px rgba(43,95,62,0.35); transition: all 0.2s; z-index: 100; }
  .btn-exportar:hover { background: #1e4a2e; transform: translateY(-2px); }
  .btn-exportar:disabled { background: var(--border-strong); box-shadow: none; transform: none; cursor: not-allowed; }

  /* ── LOADING / ERRO ── */
  .loading { text-align: center; padding: 60px; color: var(--text3); font-size: 14px; }
  .loading::after { content: ''; display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .erro-json { background: var(--danger-light); border: 1px solid #F0C8C0; border-radius: var(--radius); padding: 20px 24px; color: var(--danger); font-size: 14px; line-height: 1.7; }

  @media (max-width: 600px) {
    .container { padding: 20px 14px; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <div id="app"><div class="loading">Carregando domínios</div></div>
</div>

<button class="btn-exportar" id="btnExportar" disabled onclick="exportarExcel()">
  ↓ Exportar Excel
</button>

<script src="js/g-config.js"></script>
<script src="js/g-versao.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/g-geo.js"></script>
<script>
/* ════════════════════════════════════════════════════════
   CONFIGURAÇÃO
   ════════════════════════════════════════════════════════ */
const JSON_URL = 'dominios/f-dominios.json';

/* Estado global */
let dom              = null;
let dadosAnunciante  = {};
let dadosLocalizacao = {};

let ambientes         = [];
let contadorAmbientes = 0;

let anuncianteAberto  = true;
let localizacaoAberta = true;

const TIPOS_IMOVEL = {
  'Residencial': ['Apartamento','Casa','Sobrado','Casa em Condomínio','Cobertura','Flat / Apart-hotel','Kitnet / Quitinete','Loft','Studio','Casa Geminada','Edícula'],
  'Terreno / Rural': ['Lote / Terreno','Chácara','Sítio','Fazenda'],
  'Comercial': ['Sala Comercial','Loja','Galpão','Prédio Comercial']
};

/* ════════════════════════════════════════════════════════
   CARREGAMENTO DO JSON
   ════════════════════════════════════════════════════════ */
async function carregarDominios() {
  try {
    const r = await fetch(JSON_URL + '?v=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    dom = await r.json();
    renderApp();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="erro-json">
        <strong>Não foi possível carregar os domínios.</strong><br>
        Verifique se <code>dominios/f-dominios.json</code> está no repositório.<br>
        <small>Erro: ${e.message}</small>
      </div>`;
  }
}

/* ════════════════════════════════════════════════════════
   RENDER PRINCIPAL
   ════════════════════════════════════════════════════════ */
function renderApp() {
  document.getElementById('app').innerHTML = `
    <div id="sec-anunciante"></div>
    <div id="sec-localizacao"></div>
    <div id="sec-comodos"></div>`;
  renderAnunciante();
  renderLocalizacao();
  renderComodos();
}

/* ════════════════════════════════════════════════════════
   ACCORDION DE SEÇÃO
   ════════════════════════════════════════════════════════ */
function toggleSecao(secaoId) {
  const wrap  = document.getElementById('wrap-' + secaoId);
  const arrow = document.getElementById('arrow-secao-' + secaoId);
  if (!wrap) return;
  const aberto = wrap.style.maxHeight && wrap.style.maxHeight !== '0px';
  if (aberto) {
    wrap.style.maxHeight = '0';
    if (arrow) arrow.classList.remove('aberto');
    if (secaoId === 'anunciante') anuncianteAberto = false;
    else localizacaoAberta = false;
  } else {
    wrap.style.maxHeight = wrap.scrollHeight + 'px';
    if (arrow) arrow.classList.add('aberto');
    if (secaoId === 'anunciante') anuncianteAberto = true;
    else localizacaoAberta = true;
  }
}

function inicializarSecao(secaoId, aberto) {
  const wrap  = document.getElementById('wrap-' + secaoId);
  const arrow = document.getElementById('arrow-secao-' + secaoId);
  if (!wrap) return;
  if (aberto) {
    wrap.style.maxHeight = wrap.scrollHeight + 'px';
    if (arrow) arrow.classList.add('aberto');
  } else {
    wrap.style.maxHeight = '0';
    if (arrow) arrow.classList.remove('aberto');
  }
}

/* ════════════════════════════════════════════════════════
   SEÇÃO ANUNCIANTE
   ════════════════════════════════════════════════════════ */
function renderAnunciante() {
  /* Gera campos dinamicamente respeitando condicionais */
  const tipoAtual = dadosAnunciante['tipo'] || '';

  let campos = '';
  dom.anunciante.campos.forEach(c => {
    if (c.id === 'creci_j' && tipoAtual !== 'Imobiliária') return;

    const attrModificado = { ...c };
    if (c.id === 'cpf' && tipoAtual === 'Imobiliária') {
      attrModificado.label = 'CNPJ';
    }

    campos += campoDom(attrModificado, dadosAnunciante, 'anunciante');
  });

  document.getElementById('sec-anunciante').innerHTML = `
    <div class="secao">
      <div class="secao-header minimizavel" onclick="toggleSecao('anunciante')">
        <div class="secao-header-left">
          <div class="secao-icone">👤</div>
          <div>
            <div class="secao-titulo">Anunciante</div>
            <div class="secao-subtitulo">Quem está anunciando este imóvel</div>
          </div>
        </div>
        <span class="secao-arrow" id="arrow-secao-anunciante">▾</span>
      </div>
      <div class="secao-body-wrap" id="wrap-anunciante" style="max-height:0">
        <div class="secao-body">
          <div class="grid-2">${campos}</div>
        </div>
      </div>
    </div>`;

  setTimeout(() => inicializarSecao('anunciante', anuncianteAberto), 10);
}

/* ════════════════════════════════════════════════════════
   SEÇÃO LOCALIZAÇÃO
   ════════════════════════════════════════════════════════ */
function renderLocalizacao() {
  const estados = dom.estados_brasil.map(e =>
    `<option value="${e}" ${dadosLocalizacao.estado===e?'selected':''}>${e}</option>`
  ).join('');

  const tipoAtual = dadosLocalizacao.tipo_imovel || '';
  let opcosTipo = `<option value="">— selecione —</option>`;
  Object.entries(TIPOS_IMOVEL).forEach(([grupo, tipos]) => {
    opcosTipo += `<optgroup label="${grupo}">`;
    tipos.forEach(t => {
      opcosTipo += `<option value="${t}" ${tipoAtual===t?'selected':''}>${t}</option>`;
    });
    opcosTipo += `</optgroup>`;
  });

  const ruaReadonly    = dadosLocalizacao.rua    ? 'readonly' : '';
  const bairroReadonly = dadosLocalizacao.bairro ? 'readonly' : '';

  document.getElementById('sec-localizacao').innerHTML = `
    <div class="secao">
      <div class="secao-header minimizavel" onclick="toggleSecao('localizacao')">
        <div class="secao-header-left">
          <div class="secao-icone">📍</div>
          <div>
            <div class="secao-titulo">Localização do Imóvel</div>
            <div class="secao-subtitulo">Digite o CEP para preenchimento automático</div>
          </div>
        </div>
        <span class="secao-arrow" id="arrow-secao-localizacao">▾</span>
      </div>
      <div class="secao-body-wrap" id="wrap-localizacao" style="max-height:0">
        <div class="secao-body">

          <div class="grid-2" style="margin-bottom:6px">
            <div class="campo">
              <label>Tipo de Imóvel</label>
              <div class="select-wrap">
                <select onchange="salvarLoc('tipo_imovel',this.value)">${opcosTipo}</select>
              </div>
            </div>
            <div></div>
          </div>

          <div class="grupo-label" style="margin-top:8px">Endereço</div>

          <div class="grid-2">
            <div class="campo">
              <label>País</label>
              <div class="select-wrap">
                <select onchange="salvarLoc('pais',this.value)">
                  <option value="Brasil" ${(dadosLocalizacao.pais||'Brasil')==='Brasil'?'selected':''}>Brasil</option>
                  <option value="Outro"  ${dadosLocalizacao.pais==='Outro'?'selected':''}>Outro</option>
                </select>
              </div>
            </div>
            <div class="campo">
              <label>CEP</label>
              <input type="text" id="campo-cep" maxlength="9" placeholder="00000-000"
                value="${dadosLocalizacao.cep||''}"
                oninput="mascaraCEP(this)" onblur="buscarCEP(this.value)">
            </div>
          </div>
          <div class="grid-2">
            <div class="campo">
              <label>Rua / Logradouro</label>
              <input type="text" id="campo-rua" ${ruaReadonly}
                placeholder="${ruaReadonly ? 'Preenchido pelo CEP' : 'Digite a rua manualmente'}"
                value="${dadosLocalizacao.rua||''}"
                oninput="salvarLoc('rua',this.value)">
            </div>
            <div class="campo">
              <label>Bairro</label>
              <input type="text" id="campo-bairro" ${bairroReadonly}
                placeholder="${bairroReadonly ? 'Preenchido pelo CEP' : 'Digite o bairro manualmente'}"
                value="${dadosLocalizacao.bairro||''}"
                oninput="salvarLoc('bairro',this.value)">
            </div>
          </div>
          <div class="grid-3">
            <div class="campo">
              <label>Número</label>
              <input type="text" id="campo-numero" placeholder="Ex: 123"
                value="${dadosLocalizacao.numero||''}"
                oninput="salvarLoc('numero',this.value); atualizarBotao()">
            </div>
            <div class="campo">
              <label>Complemento</label>
              <div class="comp-wrap">
                <div class="select-wrap">
                  <select id="comp-tipo" onchange="montarComplemento()">
                    <option value="">—</option>
                    <option value="Apartamento">Apartamento</option>
                    <option value="Casa">Casa</option>
                    <option value="Lote">Lote</option>
                    <option value="Sala">Sala</option>
                    <option value="Bloco">Bloco</option>
                    <option value="Andar">Andar</option>
                    <option value="Conjunto">Conjunto</option>
                  </select>
                </div>
                <input type="text" id="comp-numero" placeholder="Nº"
                  oninput="montarComplemento()">
              </div>
            </div>
            <div class="campo">
              <label>Estado</label>
              <div class="select-wrap">
                <select id="campo-estado" onchange="salvarLoc('estado',this.value)">
                  <option value="">— selecione —</option>${estados}
                </select>
              </div>
            </div>
          </div>
          <div class="grid-2">
            <div class="campo">
              <label>Cidade</label>
              <input type="text" id="campo-cidade" readonly placeholder="Preenchida pelo CEP"
                value="${dadosLocalizacao.cidade||''}">
            </div>
          </div>

        </div>
      </div>
    </div>`;

  setTimeout(() => inicializarSecao('localizacao', localizacaoAberta), 10);
}

function mascaraCEP(input) {
  let v = input.value.replace(/\D/g,'').slice(0,8);
  if (v.length > 5) v = v.slice(0,5) + '-' + v.slice(5);
  input.value = v;
}

async function buscarCEP(cep) {
  const limpo = cep.replace(/\D/g,'');
  if (limpo.length !== 8) return;
  try {
    const r = await fetch(`https://viacep.com.br/ws/${limpo}/json/`);
    const d = await r.json();
    if (d.erro) { alert('CEP não encontrado.'); return; }

    const campoRua    = document.getElementById('campo-rua');
    const campoBairro = document.getElementById('campo-bairro');

    /* Se logradouro vier vazio (CEP genérico), remove readonly para edição manual */
    if (d.logradouro) {
      campoRua.value = d.logradouro;
      campoRua.setAttribute('readonly', true);
      campoRua.placeholder = 'Preenchido pelo CEP';
    } else {
      campoRua.value = '';
      campoRua.removeAttribute('readonly');
      campoRua.placeholder = 'CEP genérico — digite a rua manualmente';
    }

    if (d.bairro) {
      campoBairro.value = d.bairro;
      campoBairro.setAttribute('readonly', true);
      campoBairro.placeholder = 'Preenchido pelo CEP';
    } else {
      campoBairro.value = '';
      campoBairro.removeAttribute('readonly');
      campoBairro.placeholder = 'CEP genérico — digite o bairro manualmente';
    }

    document.getElementById('campo-cidade').value = d.localidade || '';
    document.getElementById('campo-estado').value = d.uf         || '';

    salvarLoc('cep',    cep);
    salvarLoc('rua',    d.logradouro || '');
    salvarLoc('bairro', d.bairro     || '');
    salvarLoc('cidade', d.localidade || '');
    salvarLoc('estado', d.uf         || '');

    /* Geocodifica em segundo plano (best-effort) e grava lat/lng.
       Não bloqueia o preenchimento — se falhar, exporta sem coordenada. */
    geocodificarEndereco({
      rua:    d.logradouro || '',
      numero: dadosLocalizacao.numero || '',
      cidade: d.localidade || '',
      uf:     d.uf || ''
    }).then(coord => {
      if (coord) {
        salvarLoc('lat', coord.lat);
        salvarLoc('lng', coord.lng);
      }
    });

    atualizarBotao();
  } catch(e) { console.warn('Erro CEP:', e.message); }
}

function salvarLoc(campo, valor) { dadosLocalizacao[campo] = valor; }

/* ════════════════════════════════════════════════════════
   SEÇÃO AMBIENTES
   ════════════════════════════════════════════════════════ */
function renderComodos() {
  const opcoesHtml = dom.tipos_ambiente
    .map(t => `<option value="${t}">${t}</option>`).join('') +
    '<option value="__outro__">Outro...</option>';

  document.getElementById('sec-comodos').innerHTML = `
    <div class="secao">
      <div class="secao-header">
        <div class="secao-icone">🏠</div>
        <div>
          <div class="secao-titulo">Ambientes</div>
          <div class="secao-subtitulo">Adicione e detalhe cada ambiente do imóvel</div>
        </div>
      </div>
      <div class="secao-body">
        <div id="lista-ambientes"></div>
        <div class="seletor-ambiente" id="seletor-ambiente" style="display:none">
          <div class="seletor-row">
            <div class="select-wrap" style="flex:1;min-width:160px">
              <select id="select-tipo-amb" onchange="onChangeTipoAmb(this.value)">
                <option value="">— tipo de ambiente —</option>
                ${opcoesHtml}
              </select>
            </div>
            <input id="input-tipo-custom" type="text" placeholder="Ex: Sala de Jogos"
              style="display:none">
            <button class="btn-confirmar-amb" onclick="confirmarAmbiente()">Adicionar</button>
            <button class="btn-cancelar-amb"  onclick="cancelarSeletor()">Cancelar</button>
          </div>
        </div>
        <button class="btn-adicionar" id="btn-add-ambiente" onclick="abrirSeletor()">+ Adicionar Ambiente</button>
      </div>
    </div>`;

  ambientes.filter(a => !a.removido).forEach(a => renderBlocoAmbiente(a.id));
}

/* ── SELETOR DE TIPO ── */
function abrirSeletor() {
  document.getElementById('seletor-ambiente').style.display = '';
  document.getElementById('btn-add-ambiente').style.display = 'none';
  document.getElementById('select-tipo-amb').value = '';
  const inp = document.getElementById('input-tipo-custom');
  inp.style.display = 'none';
  inp.value = '';
}

function cancelarSeletor() {
  document.getElementById('seletor-ambiente').style.display = 'none';
  document.getElementById('btn-add-ambiente').style.display = '';
}

function onChangeTipoAmb(val) {
  const inp = document.getElementById('input-tipo-custom');
  inp.style.display = val === '__outro__' ? '' : 'none';
  if (val !== '__outro__') inp.value = '';
}

function normalizarTipo(str) {
  return str.trim()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .toLowerCase()
    .replace(/\b\w/g, l => l.toUpperCase());
}

function confirmarAmbiente() {
  const sel = document.getElementById('select-tipo-amb').value;
  const inp = document.getElementById('input-tipo-custom').value.trim();
  let tipo = '';
  if (sel === '__outro__') {
    if (!inp) { document.getElementById('input-tipo-custom').focus(); return; }
    tipo = normalizarTipo(inp);
  } else if (sel) {
    tipo = sel;
  } else { return; }
  cancelarSeletor();
  adicionarAmbiente(tipo);
}

/* ── AMBIENTES ── */
function adicionarAmbiente(tipo) {
  const removido = ambientes.find(a => a.removido && a.tipo === tipo);
  if (removido) {
    removido.removido = false;
    document.getElementById('lista-ambientes').innerHTML = '';
    ambientes.filter(a => !a.removido).forEach(a => renderBlocoAmbiente(a.id));
  } else {
    contadorAmbientes++;
    const id = 'a' + contadorAmbientes;
    ambientes.push({ id, tipo, dados: {}, removido: false });
    renderBlocoAmbiente(id);
  }
  renumerarAmbientes();
  atualizarBotao();
}

function removerAmbiente(id, e) {
  e.stopPropagation();
  const a = ambientes.find(a => a.id === id);
  if (a) a.removido = true;
  document.getElementById('bloco-' + id)?.remove();
  renumerarAmbientes();
  atualizarBotao();
}

function renderBlocoAmbiente(id) {
  const a = ambientes.find(a => a.id === id);
  if (!a) return;
  const visiveis = ambientes.filter(x => !x.removido && x.tipo === a.tipo);
  const idx  = visiveis.findIndex(x => x.id === id);
  const num  = idx + 1;
  const nome = (a.tipo === 'Quarto' && a.dados.e_suite === 'Sim')
    ? `Suíte ${num}`
    : `${a.tipo} ${num}`;

  const antigo = document.getElementById('bloco-' + id);
  if (antigo) antigo.remove();

  const div = document.createElement('div');
  div.id = 'bloco-' + id;
  div.innerHTML = cartaoComodo(id, nome, num, a.dados, a.tipo, true);
  document.getElementById('lista-ambientes').appendChild(div);
  if (a.tipo === 'Quarto') atualizarBanheiroSuite(id);
}

function renumerarAmbientes() {
  const visiveis  = ambientes.filter(a => !a.removido);
  const idxPorTipo = {};
  visiveis.forEach(a => {
    idxPorTipo[a.tipo] = (idxPorTipo[a.tipo] || 0) + 1;
    const num  = idxPorTipo[a.tipo];
    const nome = (a.tipo === 'Quarto' && a.dados.e_suite === 'Sim')
      ? `Suíte ${num}`
      : `${a.tipo} ${num}`;
    const elNome = document.getElementById('nome-' + a.id);
    const elNum  = document.getElementById('num-'  + a.id);
    if (elNome) elNome.textContent = nome;
    if (elNum)  elNum.style.display = 'flex';
  });
}

/* ════════════════════════════════════════════════════════
   CARTÃO DE CÔMODO
   ════════════════════════════════════════════════════════ */
function cartaoComodo(id, nome, num, dados, tipo, removivel) {
  const pre    = contarPreenchidos(tipo, dados);
  const tot    = contarTotal(tipo, dados);
  const eSuite = dados.e_suite === 'Sim';

  const gruposC = {};
  dom.atributos_comuns.forEach(a => {
    if (!gruposC[a.grupo]) gruposC[a.grupo] = [];
    gruposC[a.grupo].push(a);
  });
  let attrComuns = '';
  Object.keys(gruposC).forEach(g => {
    attrComuns += `<div class="grupo-label">${g}</div><div class="grid-2">`;
    gruposC[g].forEach(a => { attrComuns += campoDom(a, dados, id); });
    attrComuns += '</div>';
  });

  let attrEsp = '';
  const esp = dom.atributos_especificos[tipo];
  if (esp && esp.length > 0) {
    const gruposE = {};
    esp.forEach(a => {
      if (!gruposE[a.grupo]) gruposE[a.grupo] = [];
      gruposE[a.grupo].push(a);
    });
    Object.keys(gruposE).forEach(g => {
      attrEsp += `<div class="grupo-label">${g}</div><div class="grid-2">`;
      gruposE[g].forEach(a => { attrEsp += campoDom(a, dados, id); });
      attrEsp += '</div>';
    });
  }

  let banheiro = '';
  if (tipo === 'Quarto') {
    const gruposB = {};
    dom.atributos_banheiro_suite.campos.forEach(a => {
      if (!gruposB[a.grupo]) gruposB[a.grupo] = [];
      gruposB[a.grupo].push(a);
    });
    let camposBan = '';
    Object.keys(gruposB).forEach(g => {
      camposBan += `<div class="grupo-label">${g}</div><div class="grid-2">`;
      gruposB[g].forEach(a => { camposBan += campoDom(a, dados, id + '_ban'); });
      camposBan += '</div>';
    });
    banheiro = `
      <div class="banheiro-grupo ${eSuite?'visivel':''}" id="ban-${id}">
        <div class="banheiro-header">🚿 Banheiro da suíte</div>
        <div class="banheiro-body">${camposBan}</div>
      </div>`;
  }

  const badgeNum = `<div class="comodo-num" id="num-${id}">${num}</div>`;

  return `
    <div class="comodo-card" id="card-${id}">
      <div class="comodo-header" onclick="toggleComodo('${id}')">
        <div class="comodo-header-left">
          ${badgeNum}
          <div>
            <div class="comodo-nome" id="nome-${id}">${nome}</div>
            <div class="comodo-progresso" id="prog-${id}">${pre} de ${tot} campos preenchidos</div>
          </div>
        </div>
        <div class="comodo-acoes" id="acoes-${id}">
          ${eSuite ? '<span class="badge-suite">Suíte</span>' : ''}
          ${pre===tot && tot>0 ? '<span class="badge-ok">✓ Completo</span>' : ''}
          ${removivel ? `<button class="btn-remover" onclick="removerAmbiente('${id}',event)">✕</button>` : ''}
          <span class="comodo-arrow aberto" id="arrow-${id}">▾</span>
        </div>
      </div>
      <div class="comodo-body aberto" id="body-${id}">

        <div class="apelido-wrap">
          <span class="apelido-label">Apelido (ref. interna):</span>
          <input type="text" placeholder="Ex: Quarto do Miguel..."
            value="${dados._apelido||''}"
            oninput="salvarDado('${id}','_apelido',this.value)">
        </div>

        <div class="grupo-label">Dimensões</div>
        <div class="grid-3">
          <div class="campo">
            <label>Formato</label>
            <div class="select-wrap">
              <select id="formato-${id}"
                onchange="salvarDado('${id}','formato',this.value); atualizarDimensoes('${id}')">
                <option value="">— selecione —</option>
                <option value="Retangular"       ${dados.formato==='Retangular'      ?'selected':''}>Retangular</option>
                <option value="Planta irregular"  ${dados.formato==='Planta irregular'?'selected':''}>Planta irregular</option>
              </select>
            </div>
          </div>
          <div id="dims-${id}" style="display:contents">${htmlDimensoes(id,dados)}</div>
        </div>

        ${attrComuns}
        ${attrEsp}
        ${banheiro}

        <div class="comodo-footer">
          <button class="btn-limpar-comodo" onclick="limparComodo('${id}',event)">
            ↺ Limpar campos
          </button>
        </div>

      </div>
    </div>`;
}

/* ════════════════════════════════════════════════════════
   DIMENSÕES
   ════════════════════════════════════════════════════════ */
function htmlDimensoes(id, dados) {
  if (!dados.formato) return '<div></div><div></div>';
  if (dados.formato === 'Retangular') {
    return `
      <div class="campo">
        <label>Largura (m)</label>
        <input type="number" min="0" step="0.01" placeholder="0.00"
          value="${dados.largura||''}"
          oninput="salvarDado('${id}','largura',this.value); calcularArea('${id}')">
      </div>
      <div class="campo">
        <label>Comprimento (m)</label>
        <input type="number" min="0" step="0.01" placeholder="0.00"
          value="${dados.comprimento||''}"
          oninput="salvarDado('${id}','comprimento',this.value); calcularArea('${id}')">
      </div>`;
  } else {
    return `
      <div class="campo">
        <label>Área total (m²)</label>
        <input type="number" min="0" step="0.01" placeholder="Ex: 18.50"
          value="${dados.area_total||''}"
          oninput="salvarDado('${id}','area_total',this.value); atualizarProgresso('${id}')">
      </div>
      <div></div>`;
  }
}

function atualizarDimensoes(id) {
  const dados = getDados(id);
  const el = document.getElementById('dims-' + id);
  if (el) el.outerHTML = `<div id="dims-${id}" style="display:contents">${htmlDimensoes(id,dados)}</div>`;
  atualizarProgresso(id);
}

function calcularArea(id) {
  const dados = getDados(id);
  const l = parseFloat(dados.largura)     || 0;
  const c = parseFloat(dados.comprimento) || 0;
  if (l && c) salvarDado(id, 'area_total', (l*c).toFixed(2));
  atualizarProgresso(id);
}

/* ════════════════════════════════════════════════════════
   CAMPO HTML A PARTIR DO JSON
   ════════════════════════════════════════════════════════ */
function campoDom(attr, dados, scopeId) {
  const val = dados[attr.id] || '';
  if (attr.tipo === 'select') {
    const opts = `<option value="">— selecione —</option>` +
      attr.opcoes.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('');
    return `
      <div class="campo">
        <label>${attr.label}</label>
        <div class="select-wrap">
          <select onchange="salvarDado('${scopeId}','${attr.id}',this.value)">${opts}</select>
        </div>
      </div>`;
  } else {
    return `
      <div class="campo">
        <label>${attr.label}</label>
        <input type="${attr.tipo==='number'?'number':'text'}" min="0"
          placeholder="${attr.tipo==='number'?'0':''}"
          value="${val}"
          oninput="salvarDado('${scopeId}','${attr.id}',this.value)">
      </div>`;
  }
}

/* ════════════════════════════════════════════════════════
   SALVAR DADOS
   ════════════════════════════════════════════════════════ */
function salvarDado(scopeId, campo, valor) {
  const id = scopeId.replace('_ban','');
  if (id === 'anunciante') {
    dadosAnunciante[campo] = valor;
    if (campo === 'tipo') renderAnunciante();
  } else {
    const dados = getDados(id);
    dados[campo] = valor;
    if (campo === 'e_suite') {
      atualizarBanheiroSuite(id);
      atualizarNomeAmbiente(id);
    }
  }
  atualizarProgresso(id);
  atualizarBotao();
}

function getDados(id) {
  const amb = ambientes.find(a => a.id === id);
  return amb ? amb.dados : {};
}

/* ════════════════════════════════════════════════════════
   LIMPAR CÔMODO
   ════════════════════════════════════════════════════════ */
function limparComodo(id, e) {
  e.stopPropagation();
  const dados = getDados(id);
  const apelido = dados._apelido;
  Object.keys(dados).forEach(k => delete dados[k]);
  if (apelido) dados._apelido = apelido;
  renderBlocoAmbiente(id);
  atualizarBotao();
}

/* ════════════════════════════════════════════════════════
   SUÍTE
   ════════════════════════════════════════════════════════ */
function atualizarBanheiroSuite(id) {
  const dados  = getDados(id);
  const eSuite = dados.e_suite === 'Sim';
  const ban    = document.getElementById('ban-' + id);
  if (ban) ban.classList.toggle('visivel', eSuite);
}

function atualizarNomeAmbiente(id) {
  const amb = ambientes.find(a => a.id === id);
  if (!amb) return;
  const visiveis = ambientes.filter(a => !a.removido && a.tipo === amb.tipo);
  const idx = visiveis.findIndex(a => a.id === id);
  if (idx < 0) return;
  const num    = idx + 1;
  const eSuite = amb.tipo === 'Quarto' && amb.dados.e_suite === 'Sim';
  const nome   = eSuite ? `Suíte ${num}` : `${amb.tipo} ${num}`;
  const el = document.getElementById('nome-' + id);
  if (el) el.textContent = nome;
  const acoes = document.getElementById('acoes-' + id);
  if (!acoes) return;
  const badgeExist = acoes.querySelector('.badge-suite');
  if (eSuite && !badgeExist) {
    const b = document.createElement('span');
    b.className = 'badge-suite'; b.textContent = 'Suíte';
    acoes.insertBefore(b, acoes.firstChild);
  } else if (!eSuite && badgeExist) { badgeExist.remove(); }
}

/* ════════════════════════════════════════════════════════
   TOGGLE CÔMODO
   ════════════════════════════════════════════════════════ */
function toggleComodo(id) {
  document.getElementById('body-'  + id)?.classList.toggle('aberto');
  document.getElementById('arrow-' + id)?.classList.toggle('aberto');
}

/* ════════════════════════════════════════════════════════
   PROGRESSO
   ════════════════════════════════════════════════════════ */
function contarTotal(tipo, dados) {
  let n = 1 + dom.atributos_comuns.length;
  const esp = dom.atributos_especificos[tipo];
  if (esp) n += esp.length;
  return n;
}

function contarPreenchidos(tipo, dados) {
  let n = 0;
  if (dados.formato) n++;
  dom.atributos_comuns.forEach(a => { if (dados[a.id]) n++; });
  const esp = dom.atributos_especificos[tipo];
  if (esp) esp.forEach(a => { if (dados[a.id]) n++; });
  return n;
}

function atualizarProgresso(id) {
  const amb   = ambientes.find(a => a.id === id);
  const tipo  = amb ? amb.tipo : '';
  const dados = getDados(id);
  const pre   = contarPreenchidos(tipo, dados);
  const tot   = contarTotal(tipo, dados);
  const el    = document.getElementById('prog-' + id);
  if (el) el.textContent = `${pre} de ${tot} campos preenchidos`;
  const acoes = document.getElementById('acoes-' + id);
  if (!acoes) return;
  const badge = acoes.querySelector('.badge-ok');
  if (pre===tot && tot>0 && !badge) {
    const b = document.createElement('span');
    b.className = 'badge-ok'; b.textContent = '✓ Completo';
    const btnRem = acoes.querySelector('.btn-remover');
    acoes.insertBefore(b, btnRem || acoes.lastChild);
  } else if ((pre!==tot || tot===0) && badge) { badge.remove(); }
}

/* ════════════════════════════════════════════════════════
   BOTÃO EXPORTAR
   ════════════════════════════════════════════════════════ */
function atualizarBotao() {
  const btn             = document.getElementById('btnExportar');
  const temLoc          = dadosLocalizacao.cep && dadosLocalizacao.numero;
  const temComodo       = ambientes.filter(a => !a.removido).length > 0;
  btn.disabled = !(temLoc && temComodo);

  if (temComodo) {
    document.getElementById('campo-cep').classList.toggle('campo-vazio', !dadosLocalizacao.cep);
    document.getElementById('campo-numero').classList.toggle('campo-vazio', !dadosLocalizacao.numero);
  } else {
    document.getElementById('campo-cep').classList.remove('campo-vazio');
    document.getElementById('campo-numero').classList.remove('campo-vazio');
  }
}

function montarComplemento() {
  const tipo  = document.getElementById('comp-tipo').value;
  const num   = document.getElementById('comp-numero').value.trim();
  const valor = tipo && num ? `${tipo} ${num}` : (tipo || num);
  salvarLoc('complemento', valor);
}

/* ════════════════════════════════════════════════════════
   EXPORTAÇÃO
   ════════════════════════════════════════════════════════ */
function exportarExcel() {
  const linhas = [['Cômodo', 'Grupo', 'Característica', 'Valor']];

  dom.anunciante.campos.forEach(c => {
    const v = dadosAnunciante[c.id];
    if (v) linhas.push(['Anunciante', c.grupo, c.label, v]);
  });

  const camposLoc = [
    ['tipo_imovel','Tipo de Imóvel'],
    ['pais','País'],['cep','CEP'],['rua','Rua'],['bairro','Bairro'],
    ['numero','Número'],['complemento','Complemento'],
    ['cidade','Cidade'],['estado','Estado'],
    ['lat','Latitude'],['lng','Longitude']
  ];
  camposLoc.forEach(([id, label]) => {
    const v = dadosLocalizacao[id];
    if (v) linhas.push(['Imóvel', 'Localização', label, v]);
  });

  const exportarComodo = (nomeComodo, tipo, dados) => {
    if (dados.formato) {
      linhas.push([nomeComodo, 'Dimensões', 'Formato', dados.formato]);
      if (dados.formato === 'Retangular') {
        if (dados.largura)     linhas.push([nomeComodo, 'Dimensões', 'Largura (m)',     dados.largura]);
        if (dados.comprimento) linhas.push([nomeComodo, 'Dimensões', 'Comprimento (m)', dados.comprimento]);
      }
      if (dados.area_total) linhas.push([nomeComodo, 'Dimensões', 'Área total (m²)', dados.area_total]);
    }
    dom.atributos_comuns.forEach(a => {
      if (dados[a.id]) linhas.push([nomeComodo, a.grupo, a.label, dados[a.id]]);
    });
    const esp = dom.atributos_especificos[tipo];
    if (esp) esp.forEach(a => {
      if (dados[a.id]) linhas.push([nomeComodo, a.grupo, a.label, dados[a.id]]);
    });
    if (tipo === 'Quarto' && dados.e_suite === 'Sim') {
      dom.atributos_banheiro_suite.campos.forEach(a => {
        if (dados[a.id]) linhas.push([nomeComodo, a.grupo, a.label, dados[a.id]]);
      });
    }
  };

  const contAtualPorTipo = {};
  ambientes.filter(a => !a.removido).forEach(a => {
    contAtualPorTipo[a.tipo] = (contAtualPorTipo[a.tipo] || 0) + 1;
    const num    = contAtualPorTipo[a.tipo];
    const nomeAmb = (a.tipo === 'Quarto' && a.dados.e_suite === 'Sim')
      ? `Suíte ${num}`
      : `${a.tipo} ${num}`;
    exportarComodo(nomeAmb, a.tipo, a.dados);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(linhas);
  ws['!cols'] = [{wch:18},{wch:28},{wch:28},{wch:30}];
  ['A1','B1','C1','D1'].forEach(c => { if (ws[c]) ws[c].s = {font:{bold:true}}; });
  XLSX.utils.book_append_sheet(wb, ws, 'Ficha');

  const limpar = str => (str||'')
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-zA-Z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');

  const compAbrev = limpar(dadosLocalizacao.complemento).slice(0,20);
  const cep  = (dadosLocalizacao.cep||'').replace(/\D/g,'') || 'SEMCEP';
  const num  = limpar(dadosLocalizacao.numero) || 'SN';
  const comp = compAbrev || '';
  const ext  = EXCEL_EXTENSOES[0];
  const nome = comp ? `${EXCEL_PREFIXO}${cep}_${num}_${comp}${ext}` : `${EXCEL_PREFIXO}${cep}_${num}${ext}`;

  XLSX.writeFile(wb, nome);
}

/* Inicializa */
carregarDominios();
</script>

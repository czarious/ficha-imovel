<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha Técnica — Zillow BR</title>
  <meta name="description" content="Ficha técnica detalhada do imóvel">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============================================================
       HEADER — Navegação principal
       ============================================================ -->
  <header class="header">
    <div class="header-inner">
      <!-- Logo -->
      <a href="index.html" class="logo" aria-label="Zillow BR — Voltar ao portal">
        <div class="logo-icone" aria-hidden="true">🏡</div>
        <span class="logo-nome">Zillow<sup class="logo-br">BR</sup></span>
      </a>

      <!-- Ações da página de detalhe -->
      <div class="header-acoes">
        <button
          class="btn btn-secundario"
          onclick="window.print()"
          aria-label="Imprimir ficha técnica"
        >
          🖨️ Imprimir
        </button>
        <button
          class="btn btn-secundario"
          id="btn-excluir"
          aria-label="Excluir este imóvel"
        >
          🗑️ Excluir
        </button>
      </div>
    </div>
  </header>

  <!-- ============================================================
       CONTEÚDO PRINCIPAL — Ficha técnica
       ============================================================ -->
  <main class="pagina-imovel">

    <!-- Link de retorno à listagem -->
    <a href="index.html" class="ficha-voltar" aria-label="Voltar à lista de imóveis">
      ← Todos os imóveis
    </a>

    <!--
      Container da ficha.
      Preenchido dinamicamente por ficha.js (função renderizarFicha).
    -->
    <div id="ficha-container" role="main" aria-live="polite">
      <!-- Loading inicial exibido enquanto o JS carrega os dados -->
      <div class="loading-wrap">
        <div class="spinner" aria-hidden="true"></div>
        <span>Carregando ficha técnica…</span>
      </div>
    </div>

  </main>

  <!-- ============================================================
       MODAL — Confirmação de exclusão
       ============================================================ -->
  <div
    class="modal-overlay"
    id="modal-excluir"
    style="display:none"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-excluir-titulo"
  >
    <div class="modal">
      <h3 class="modal-titulo" id="modal-excluir-titulo">Excluir imóvel</h3>
      <p class="modal-texto">
        Tem certeza que deseja excluir este imóvel?
        <br>Esta ação não pode ser desfeita.
      </p>
      <div class="modal-acoes">
        <button class="btn btn-fantasma" id="btn-modal-cancelar-excluir">Cancelar</button>
        <button class="btn" id="btn-modal-confirmar-excluir"
          style="background:#C0392B;color:white;">
          Excluir
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       TOASTS — Notificações temporárias
       ============================================================ -->
  <div class="toast-container" id="toast-container" aria-live="assertive"></div>

  <!-- ============================================================
       SCRIPTS — Ordem de carregamento importa:
       storage → ui → ficha → lógica da página
       ============================================================ -->
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ficha.js"></script>

  <script>
    /* ============================================================
       Lógica da página imovel.html
       ============================================================ */

    // ID lido da query string: ?id=xxxxxxxx
    const _idImovel = obterParam('id');

    /* ---- Inicialização ---- */
    document.addEventListener('DOMContentLoaded', () => {
      if (!_idImovel) {
        renderizarFicha(null);
        return;
      }

      const imovel = getImovelById(_idImovel);
      renderizarFicha(imovel);
      configurarBotaoExcluir(imovel);
    });

    /* ---- Botão excluir ---- */
    function configurarBotaoExcluir(imovel) {
      const btnExcluir = document.getElementById('btn-excluir');
      if (!imovel || !btnExcluir) return;

      btnExcluir.addEventListener('click', () => {
        // Abre o modal de confirmação de exclusão
        const overlay = document.getElementById('modal-excluir');
        overlay.style.display = 'flex';
        void overlay.offsetHeight;
        overlay.classList.add('ativo');

        // Handler de confirmação
        document.getElementById('btn-modal-confirmar-excluir').onclick = () => {
          deleteImovel(imovel.id);
          overlay.classList.remove('ativo');
          setTimeout(() => { overlay.style.display = 'none'; }, 250);
          // Redireciona para o portal com mensagem de sucesso via sessionStorage
          sessionStorage.setItem('zillow_br_toast', JSON.stringify({
            mensagem: 'Imóvel excluído com sucesso.',
            tipo: 'aviso',
            icone: '🗑️'
          }));
          window.location.href = 'index.html';
        };

        // Handler de cancelamento
        document.getElementById('btn-modal-cancelar-excluir').onclick = () => {
          overlay.classList.remove('ativo');
        };

        // Fechar ao clicar fora
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) {
            overlay.classList.remove('ativo');
            setTimeout(() => { overlay.style.display = 'none'; }, 250);
          }
        }, { once: true });
      });
    }
  </script>

  <!--
    Suporte ao toast de redirecionamento (ex: após excluir e voltar ao index).
    Este bloco também é carregado no index para processar o sessionStorage.
  -->
  <script>
    // Verifica se há um toast pendente do sessionStorage (vindo de redirecionamento)
    document.addEventListener('DOMContentLoaded', () => {
      const pendente = sessionStorage.getItem('zillow_br_toast');
      if (pendente) {
        try {
          const { mensagem, tipo, icone } = JSON.parse(pendente);
          // Pequeno delay para garantir que o DOM está pronto
          setTimeout(() => mostrarToast(mensagem, tipo, icone), 300);
        } catch (e) { /* ignora erros de parse */ }
        sessionStorage.removeItem('zillow_br_toast');
      }
    });
  </script>

</body>
</html>

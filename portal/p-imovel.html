<!-- arquivo: p-imovel.html | versao: 0.4.0 -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha Técnica — Zillow BR</title>
  <meta name="description" content="Ficha técnica detalhada do imóvel">
  <link rel="stylesheet" href="css/p-style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo" aria-label="Zillow BR — Voltar ao portal">
        <div class="logo-icone" aria-hidden="true">🏡</div>
        <span class="logo-nome">Zillow<sup class="logo-br">BR</sup></span>
      </a>
      <div class="header-acoes">
        <button class="btn btn-secundario" onclick="window.print()" aria-label="Imprimir">🖨️ Imprimir</button>
        <button class="btn btn-secundario" id="btn-excluir" aria-label="Excluir">🗑️ Excluir</button>
        <!-- Botão de versão -->
        <button
          onclick="window.location.href='p-changelog.html'"
          title="Ver histórico de versões do portal"
          style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.9);border-radius:20px;padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:0.05em;transition:background 0.15s;white-space:nowrap;"
          onmouseover="this.style.background='rgba(255,255,255,0.22)'"
          onmouseout="this.style.background='rgba(255,255,255,0.12)'"
        >v<span id="label-versao-imovel">0.3.0</span></button>
      </div>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main class="pagina-imovel">
    <a href="index.html" class="ficha-voltar">← Todos os imóveis</a>

    <!-- Barra de ações do imóvel: WhatsApp -->
    <div id="barra-acoes-imovel" style="display:none;margin-bottom:24px;"></div>

    <div id="ficha-container" role="main" aria-live="polite">
      <div class="loading-wrap">
        <div class="spinner" aria-hidden="true"></div>
        <span>Carregando ficha técnica…</span>
      </div>
    </div>
  </main>

  <!-- MODAL — Exclusão -->
  <div class="modal-overlay" id="modal-excluir" style="display:none"
       role="dialog" aria-modal="true" aria-labelledby="modal-excluir-titulo">
    <div class="modal">
      <h3 class="modal-titulo" id="modal-excluir-titulo">Excluir imóvel</h3>
      <p class="modal-texto">Tem certeza que deseja excluir este imóvel?<br>Esta ação não pode ser desfeita.</p>
      <div class="modal-acoes">
        <button class="btn btn-fantasma" id="btn-modal-cancelar-excluir">Cancelar</button>
        <button class="btn" id="btn-modal-confirmar-excluir" style="background:#C0392B;color:white;">Excluir</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container" aria-live="assertive"></div>

  <script src="js/p-storage.js"></script>
  <script src="js/p-ui.js"></script>
  <script src="js/p-render.js"></script>
  <script src="js/p-versao.js"></script>

  <script>
    /* ============================================================
       Configuração — WhatsApp
       Quando tiver o número, substitua SEU_NUMERO_AQUI pelo número
       no formato internacional sem +: ex. 5516999999999
       ============================================================ */
    const WHATSAPP_NUMERO = 'SEU_NUMERO_AQUI';

    /* ============================================================
       Inicialização
       ============================================================ */
    const _idImovel = obterParam('id');

    document.addEventListener('DOMContentLoaded', () => {
      /* Versão no botão do header */
      const labelVersao = document.getElementById('label-versao-imovel');
      if (labelVersao && typeof VERSAO_PORTAL !== 'undefined') {
        labelVersao.textContent = VERSAO_PORTAL;
      }

      if (!_idImovel) { renderizarFicha(null); return; }

      const imovel = getImovelById(_idImovel);
      renderizarFicha(imovel);
      configurarBotaoExcluir(imovel);
      renderizarBarraAcoes(imovel);

      /* Toast de redirecionamento */
      const pendente = sessionStorage.getItem('zillow_br_toast');
      if (pendente) {
        try {
          const { mensagem, tipo, icone } = JSON.parse(pendente);
          setTimeout(() => mostrarToast(mensagem, tipo, icone), 300);
        } catch(e) {}
        sessionStorage.removeItem('zillow_br_toast');
      }
    });

    /* ============================================================
       Barra de ações — botão WhatsApp
       ============================================================ */
    function renderizarBarraAcoes(imovel) {
      if (!imovel) return;
      const barra = document.getElementById('barra-acoes-imovel');
      if (!barra) return;

      const loc  = imovel.localizacao || {};
      const cad  = imovel.anunciante || {};

      /* Monta texto do endereço para a mensagem */
      const rua    = loc['Rua']    || '';
      const numero = loc['Número'] || loc['Numero'] || '';
      const compl  = loc['Complemento'] || '';
      const cidade = loc['Cidade'] || '';
      const endMsg = [rua, numero, compl, cidade].filter(Boolean).join(', ');

      /* Mensagem pré-preenchida */
      const mensagem = encodeURIComponent(
        `Olá! Vi o imóvel no Zillow BR (${endMsg}) e tenho interesse. Poderia me dar mais informações?`
      );

      const linkWA = WHATSAPP_NUMERO !== 'SEU_NUMERO_AQUI'
        ? `https://wa.me/55${WHATSAPP_NUMERO.replace(/\D/g,'')}?text=${mensagem}`
        : null;

      barra.style.display = 'flex';
      barra.style.gap = '12px';
      barra.style.flexWrap = 'wrap';
      barra.style.alignItems = 'center';

      if (linkWA) {
        barra.innerHTML = `
          <a
            href="${linkWA}"
            target="_blank"
            rel="noopener"
            class="btn-whatsapp"
            aria-label="Entrar em contato via WhatsApp"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            Falar com o responsável
          </a>`;
      } else {
        /* Placeholder quando número ainda não foi configurado */
        barra.innerHTML = `
          <div style="background:#FFF8E1;border:1px solid #FFD54F;border-radius:8px;padding:10px 16px;font-size:13px;color:#795548;">
            ⚠️ WhatsApp não configurado — edite <code>WHATSAPP_NUMERO</code> em <code>imovel.html</code>
          </div>`;
      }
    }

    /* ============================================================
       Botão excluir
       ============================================================ */
    function configurarBotaoExcluir(imovel) {
      const btnExcluir = document.getElementById('btn-excluir');
      if (!imovel || !btnExcluir) return;

      btnExcluir.addEventListener('click', () => {
        const overlay = document.getElementById('modal-excluir');
        overlay.style.display = 'flex';
        void overlay.offsetHeight;
        overlay.classList.add('ativo');

        document.getElementById('btn-modal-confirmar-excluir').onclick = () => {
          deleteImovel(imovel.id);
          overlay.classList.remove('ativo');
          setTimeout(() => { overlay.style.display = 'none'; }, 250);
          sessionStorage.setItem('zillow_br_toast', JSON.stringify({
            mensagem: 'Imóvel excluído com sucesso.',
            tipo: 'aviso',
            icone: '🗑️'
          }));
          window.location.href = 'index.html';
        };

        document.getElementById('btn-modal-cancelar-excluir').onclick = () => {
          overlay.classList.remove('ativo');
          setTimeout(() => { overlay.style.display = 'none'; }, 250);
        };

        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) {
            overlay.classList.remove('ativo');
            setTimeout(() => { overlay.style.display = 'none'; }, 250);
          }
        }, { once: true });
      });
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha Técnica — Zillow BR</title>
  <meta name="description" content="Ficha técnica detalhada do imóvel">
  <link rel="stylesheet" href="css/p-style.css">
  <link rel="stylesheet" href="css/g-global.css">
  <!-- SheetJS — necessário para p-parser.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Google Identity Services — OAuth 2.0 -->
  <script src="https://accounts.google.com/gsi/client" onload="inicializarOAuth()" async defer></script>

  <style>
    /* ============================================================
       Botão WhatsApp flutuante — fixo no canto inferior direito
       ============================================================ */
    #btn-wpp-flutuante {
      display: none;
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 999;
    }

    #btn-wpp-flutuante a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: #25D366;
      border-radius: 50%;
      box-shadow: 0 4px 16px rgba(37, 211, 102, 0.45);
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    #btn-wpp-flutuante a:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 22px rgba(37, 211, 102, 0.6);
    }

    #btn-wpp-flutuante svg {
      width: 32px;
      height: 32px;
      fill: #ffffff;
    }

    #btn-wpp-flutuante a::before {
      content: attr(data-tooltip);
      position: absolute;
      right: 70px;
      background: #1a1a1a;
      color: #fff;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    #btn-wpp-flutuante a:hover::before {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- BARRA DE AÇÕES -->
  <div class="barra-acoes">
    <a href="index.html" class="btn btn-fantasma">← Todos os imóveis</a>
    <button class="btn btn-secundario" onclick="window.print()" aria-label="Imprimir">🖨️ Imprimir</button>
    <button class="btn btn-secundario" id="btn-excluir" aria-label="Excluir">🗑️ Excluir</button>
  </div>

  <!-- CONTEÚDO -->
  <main class="pagina-imovel">

    <div id="ficha-container" role="main" aria-live="polite">
      <div class="loading-wrap">
        <div class="spinner" aria-hidden="true"></div>
        <span>Carregando ficha técnica…</span>
      </div>
    </div>
  </main>

  <!-- BOTÃO WHATSAPP FLUTUANTE -->
  <div id="btn-wpp-flutuante" aria-label="Entrar em contato via WhatsApp">
    <!-- Preenchido dinamicamente por renderizarBotaoWhatsApp() -->
  </div>

  <!-- MODAL — Exclusão -->
  <div class="modal-overlay" id="modal-excluir" style="display:none"
       role="dialog" aria-modal="true" aria-labelledby="modal-excluir-titulo">
    <div class="modal">
      <h3 class="modal-titulo" id="modal-excluir-titulo">Excluir imóvel</h3>
      <p class="modal-texto">Tem certeza que deseja excluir este imóvel?<br>Esta ação não pode ser desfeita.</p>
      <div class="modal-acoes">
        <button class="btn btn-fantasma" id="btn-modal-cancelar-excluir">Cancelar</button>
        <button class="btn" id="btn-modal-confirmar-excluir" style="background:#C0392B;color:white;">Excluir</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container" aria-live="assertive"></div>

  <!-- ============================================================
       SCRIPTS — ordem importa
       p-config.js deve ser o primeiro
       ============================================================ -->
  <script src="js/p-config.js"></script>
  <script src="js/p-storage.js"></script>
  <script src="js/p-parser.js"></script>
  <script src="js/p-ui.js"></script>
  <script src="js/p-render.js"></script>
  <script src="js/g-versao.js"></script>
  <script>const MENU_BASE = './';</script>
  <script src="js/g-menu.js"></script>

  <script>
    /* ============================================================
       Inicialização
       ============================================================ */
    const _idImovel = obterParam('id');

    document.addEventListener('DOMContentLoaded', async () => {
      if (!_idImovel) { renderizarFicha(null); return; }

      /* Busca imóvel no Drive */
      try {
        const imovel = await getImovelById(_idImovel);
        renderizarFicha(imovel);
        configurarBotaoExcluir(imovel);
        renderizarBotaoWhatsApp(imovel);
      } catch (e) {
        renderizarFicha(null);
      }

      /* Toast de redirecionamento */
      const pendente = sessionStorage.getItem('zillow_br_toast');
      if (pendente) {
        try {
          const { mensagem, tipo, icone } = JSON.parse(pendente);
          setTimeout(() => mostrarToast(mensagem, tipo, icone), 300);
        } catch(e) {}
        sessionStorage.removeItem('zillow_br_toast');
      }
    });

    /* ============================================================
       Botão WhatsApp flutuante
       Número vem de anunciante['Telefone'] — sem hardcode
       ============================================================ */
    function renderizarBotaoWhatsApp(imovel) {
      if (!imovel) return;

      const botao = document.getElementById('btn-wpp-flutuante');
      if (!botao) return;

      const loc = imovel.localizacao || {};
      const cad = imovel.anunciante  || {};

      /* Número: usa Telefone do anunciante, remove tudo que não é dígito */
      const telefone = (cad['Telefone'] || '').replace(/\D/g, '');

      /* Endereço para a mensagem pré-preenchida */
      const endMsg = [
        loc['Rua'], loc['Número'] || loc['Numero'],
        loc['Complemento'], loc['Cidade']
      ].filter(Boolean).join(', ');

      const mensagem = encodeURIComponent(
        `Olá! Vi o imóvel no Zillow BR (${endMsg}) e tenho interesse. Poderia me dar mais informações?`
      );

      if (!telefone) return;

      const linkWA = `https://wa.me/55${telefone}?text=${mensagem}`;

      botao.style.display = 'block';
      botao.innerHTML = `
        <a
          href="${linkWA}"
          target="_blank"
          rel="noopener noreferrer"
          data-tooltip="Falar com o anunciante"
          aria-label="Falar com o anunciante via WhatsApp"
        >
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
        </a>`;
    }

    /* ============================================================
       Botão excluir — async pois deleteImovel usa Drive API
       ============================================================ */
    function configurarBotaoExcluir(imovel) {
      const btnExcluir = document.getElementById('btn-excluir');
      if (!imovel || !btnExcluir) return;

      btnExcluir.addEventListener('click', () => {
        const overlay = document.getElementById('modal-excluir');
        overlay.style.display = 'flex';
        void overlay.offsetHeight;
        overlay.classList.add('ativo');

        document.getElementById('btn-modal-confirmar-excluir').onclick = async () => {
          try {
            overlay.classList.remove('ativo');
            setTimeout(() => { overlay.style.display = 'none'; }, 250);
            mostrarToast('Excluindo imóvel…', '', '⏳');
            await deleteImovel(imovel.id);
            sessionStorage.setItem('zillow_br_toast', JSON.stringify({
              mensagem: 'Imóvel excluído com sucesso.',
              tipo: 'aviso',
              icone: '🗑️'
            }));
            window.location.href = 'index.html';
          } catch (e) {
            mostrarToast('Erro ao excluir. Tente novamente.', 'erro', '❌');
          }
        };

        document.getElementById('btn-modal-cancelar-excluir').onclick = () => {
          overlay.classList.remove('ativo');
          setTimeout(() => { overlay.style.display = 'none'; }, 250);
        };

        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) {
            overlay.classList.remove('ativo');
            setTimeout(() => { overlay.style.display = 'none'; }, 250);
          }
        }, { once: true });
      });
    }
  </script>

</body>
</html>

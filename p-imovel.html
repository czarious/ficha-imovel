<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha Técnica</title>
  <meta name="description" content="Ficha técnica detalhada do imóvel">
  <link rel="stylesheet" href="css/p-style.css">
  <link rel="stylesheet" href="css/g-global.css">
  <!-- Leaflet — mapa (OpenStreetMap, sem chave) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- SheetJS — necessário para p-parser.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Google Identity Services — OAuth 2.0 -->
  <script src="https://accounts.google.com/gsi/client" onload="inicializarOAuth()" async defer></script>

  <style>
    /* ============================================================
       Mapa — Leaflet (localização do imóvel)
       ============================================================ */
    .secao-mapa        { margin-top: 32px; }
    .secao-mapa-titulo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 12px; }
    #mapa-imovel       { width: 100%; height: 360px; border-radius: 12px; }
    .secao-mapa-nota   { font-size: 0.85rem; color: #666; margin-top: 8px; }

    /* ============================================================
       Botão WhatsApp flutuante — fixo no canto inferior direito
       ============================================================ */
    #btn-wpp-flutuante {
      display: none;
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 999;
    }

    #btn-wpp-flutuante a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: #25D366;
      border-radius: 50%;
      box-shadow: 0 4px 16px rgba(37, 211, 102, 0.45);
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    #btn-wpp-flutuante a:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 22px rgba(37, 211, 102, 0.6);
    }

    #btn-wpp-flutuante svg {
      width: 32px;
      height: 32px;
      fill: #ffffff;
    }

    #btn-wpp-flutuante a::before {
      content: attr(data-tooltip);
      position: absolute;
      right: 70px;
      background: #1a1a1a;
      color: #fff;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    #btn-wpp-flutuante a:hover::before {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- BARRA DE AÇÕES -->
  <div class="barra-acoes">
    <a href="index.html" class="btn btn-fantasma">← Todos os imóveis</a>
    <button class="btn btn-secundario" onclick="copiarLink()" aria-label="Copiar link">🔗 Copiar link</button>
    <button class="btn btn-secundario" onclick="window.print()" aria-label="Imprimir">🖨️ Imprimir</button>
    <button class="btn btn-secundario" id="btn-excluir" aria-label="Excluir">🗑️ Excluir</button>
  </div>

  <!-- CONTEÚDO -->
  <main class="pagina-imovel">

    <div id="ficha-container" role="main" aria-live="polite">
      <div class="loading-wrap">
        <div class="spinner" aria-hidden="true"></div>
        <span>Carregando ficha técnica…</span>
      </div>
    </div>

    <!-- MAPA — localização aproximada (após o detalhamento por cômodo) -->
    <section id="secao-mapa" class="secao-mapa" style="display:none">
      <h2 class="secao-mapa-titulo">Localização</h2>
      <div id="mapa-imovel"></div>
      <p class="secao-mapa-nota">📍 Localização aproximada</p>
    </section>
  </main>

  <!-- BOTÃO WHATSAPP FLUTUANTE -->
  <div id="btn-wpp-flutuante" aria-label="Entrar em contato via WhatsApp">
    <!-- Preenchido dinamicamente por renderizarBotaoWhatsApp() -->
  </div>

  <!-- MODAL — Exclusão -->
  <div class="modal-overlay" id="modal-excluir" style="display:none"
       role="dialog" aria-modal="true" aria-labelledby="modal-excluir-titulo">
    <div class="modal">
      <h3 class="modal-titulo" id="modal-excluir-titulo">Excluir imóvel</h3>
      <p class="modal-texto">Tem certeza que deseja excluir este imóvel?<br>Esta ação não pode ser desfeita.</p>
      <div class="modal-acoes">
        <button class="btn btn-fantasma" id="btn-modal-cancelar-excluir">Cancelar</button>
        <button class="btn" id="btn-modal-confirmar-excluir" style="background:#C0392B;color:white;">Excluir</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container" aria-live="assertive"></div>

  <!-- ============================================================
       SCRIPTS — ordem importa
       g-config.js deve ser o primeiro
       ============================================================ -->
  <script src="js/g-config.js"></script>
  <script src="js/p-storage.js"></script>
  <script src="js/p-parser.js"></script>
  <script src="js/p-ui.js"></script>
  <script src="js/p-render.js"></script>
  <script src="js/g-geo.js"></script>
  <script src="js/p-mapa.js"></script>
  <script src="js/p-acoes.js"></script>
  <script src="js/g-versao.js"></script>
  <script>const MENU_BASE = './';</script>
  <script src="js/g-menu.js"></script>

  <script>
    /* ============================================================
       Inicialização — orquestra render, ações (p-acoes.js) e mapa (p-mapa.js)
       ============================================================ */
    const _idImovel = obterParam('id');

    document.addEventListener('DOMContentLoaded', async () => {
      if (!_idImovel) { renderizarFicha(null); return; }

      /* Busca imóvel no Drive */
      try {
        const imovel = await getImovelById(_idImovel);
        renderizarFicha(imovel);
        configurarBotaoExcluir(imovel);
        renderizarBotaoWhatsApp(imovel);
        montarMapa(imovel);
      } catch (e) {
        renderizarFicha(null);
      }

      /* Toast deixado por outra página antes de redirecionar */
      mostrarToastPendente();
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha Técnica de Imóvel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --surface2: #F9F8F5;
    --border: #E2DDD6;
    --border-strong: #C8C0B4;
    --text: #1A1714;
    --text2: #6B6560;
    --text3: #9C958E;
    --accent: #2B5F3E;
    --accent-light: #EAF2ED;
    --accent2: #8B4513;
    --danger: #C0392B;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px 0;
  }

  header {
    background: var(--accent);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    color: #fff;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  header span {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* SELEÇÃO DE CÔMODOS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .card-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .card-header:hover { background: var(--surface2); }

  .card-header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .card-num {
    width: 32px;
    height: 32px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--text);
  }

  .card-subtitle {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }

  .card-arrow {
    font-size: 18px;
    color: var(--text3);
    transition: transform 0.25s;
  }

  .card-arrow.open { transform: rotate(180deg); }

  .card-body {
    display: none;
    padding: 24px;
    animation: slideDown 0.2s ease;
  }

  .card-body.open { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* SELEÇÃO INICIAL */
  .selecao-comodos {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px;
    margin-bottom: 28px;
  }

  .selecao-comodos h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 19px;
    font-weight: 400;
    margin-bottom: 6px;
  }

  .selecao-comodos p {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 20px;
  }

  .checkboxes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }

  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
  }

  .checkbox-item:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .checkbox-item input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .checkbox-item.checked {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 500;
  }

  /* FORMULÁRIO */
  .campo-grupo {
    margin-bottom: 18px;
  }

  .campo-grupo label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 7px;
  }

  .campo-grupo input,
  .campo-grupo select {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  .campo-grupo input:focus,
  .campo-grupo select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(43,95,62,0.08);
  }

  .select-wrapper {
    position: relative;
  }

  .select-wrapper::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    pointer-events: none;
    font-size: 13px;
  }

  /* DIMENSÕES */
  .dimensoes-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  .area-calc {
    background: var(--accent-light);
    border: 1px solid #C3DBC9;
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--accent);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .area-calc span { font-size: 12px; font-weight: 400; color: #5A9470; }

  /* DIVISOR */
  .divisor {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .secao-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  .campos-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  /* ESTADO VAZIO */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text3);
  }

  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* BOTÃO EXPORTAR */
  .btn-exportar {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 15px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(43,95,62,0.35);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 100;
  }

  .btn-exportar:hover {
    background: #1e4a2e;
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(43,95,62,0.45);
  }

  .btn-exportar:disabled {
    background: var(--border-strong);
    box-shadow: none;
    transform: none;
    cursor: not-allowed;
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--text3);
    font-size: 14px;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 10px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .erro-json {
    background: #FDF0EE;
    border: 1px solid #F0C8C0;
    border-radius: var(--radius);
    padding: 20px 24px;
    color: var(--danger);
    font-size: 14px;
    line-height: 1.6;
  }

  /* BADGE PREENCHIDO */
  .badge-ok {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid #C3DBC9;
  }

  @media (max-width: 600px) {
    header { padding: 20px; }
    .container { padding: 24px 16px; }
    .dimensoes-grid { grid-template-columns: 1fr 1fr; }
    .dimensoes-grid .area-col { grid-column: 1 / -1; }
    .campos-2col { grid-template-columns: 1fr; }
    .checkboxes-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Ficha Técnica de Imóvel</h1>
    <span>Levantamento detalhado por cômodo</span>
  </div>
</header>

<div class="container">
  <div id="app">
    <div class="loading">Carregando domínios</div>
  </div>
</div>

<button class="btn-exportar" id="btnExportar" disabled onclick="exportarExcel()">
  ↓ Exportar Excel
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const JSON_URL = 'https://raw.githubusercontent.com/czarious/ficha-imovel/main/dominios/dominios.json';

let dominios = null;
let dadosComodos = {};

// ── CARREGAR DOMÍNIOS ──────────────────────────────────────────
async function carregarDominios() {
  try {
    const r = await fetch(JSON_URL);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    dominios = await r.json();
    renderApp();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="erro-json">
        <strong>Não foi possível carregar os domínios.</strong><br>
        Verifique se o arquivo <code>dominios/dominios.json</code> foi enviado ao repositório GitHub.<br><br>
        <small>Erro técnico: ${e.message}</small>
      </div>`;
  }
}

// ── RENDER PRINCIPAL ──────────────────────────────────────────
function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="selecao-comodos">
      <h2>Selecione os cômodos do imóvel</h2>
      <p>Marque os ambientes presentes. Um grupo de preenchimento será aberto para cada um.</p>
      <div class="checkboxes-grid" id="checkboxesComodos"></div>
    </div>
    <div id="gruposComodos"></div>
  `;
  renderCheckboxes();
}

// ── CHECKBOXES ────────────────────────────────────────────────
function renderCheckboxes() {
  const container = document.getElementById('checkboxesComodos');
  container.innerHTML = '';
  dominios.tipos_de_comodo.forEach(tipo => {
    const checked = dadosComodos[tipo] !== undefined;
    const div = document.createElement('label');
    div.className = 'checkbox-item' + (checked ? ' checked' : '');
    div.innerHTML = `
      <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleComodo('${tipo}', this.checked)">
      ${tipo}
    `;
    container.appendChild(div);
  });
}

// ── TOGGLE CÔMODO ─────────────────────────────────────────────
function toggleComodo(tipo, ativo) {
  if (ativo) {
    if (!dadosComodos[tipo]) dadosComodos[tipo] = {};
  } else {
    delete dadosComodos[tipo];
  }
  renderCheckboxes();
  renderGrupos();
  atualizarBotao();
}

// ── RENDER GRUPOS ─────────────────────────────────────────────
function renderGrupos() {
  const container = document.getElementById('gruposComodos');
  container.innerHTML = '';

  const selecionados = Object.keys(dadosComodos);

  if (selecionados.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🏠</div>
        <p>Nenhum cômodo selecionado ainda.<br>Marque os ambientes acima para começar o preenchimento.</p>
      </div>`;
    return;
  }

  selecionados.forEach((tipo, idx) => {
    const dados = dadosComodos[tipo];
    const preenchido = contarPreenchidos(tipo);
    const total = contarTotal(tipo);

    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + tipo.replace(/\s/g,'_');

    const estaAberto = dados._aberto !== false;

    card.innerHTML = `
      <div class="card-header" onclick="toggleCard('${tipo}')">
        <div class="card-header-left">
          <div class="card-num">${idx + 1}</div>
          <div>
            <div class="card-title">${tipo}</div>
            <div class="card-subtitle">${preenchido} de ${total} campos preenchidos</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${preenchido === total && total > 0 ? '<span class="badge-ok">✓ Completo</span>' : ''}
          <span class="card-arrow ${estaAberto ? 'open' : ''}">▾</span>
        </div>
      </div>
      <div class="card-body ${estaAberto ? 'open' : ''}" id="body-${tipo.replace(/\s/g,'_')}">
        ${renderFormComodo(tipo)}
      </div>
    `;
    container.appendChild(card);
  });
}

// ── FORMULÁRIO DO CÔMODO ──────────────────────────────────────
function renderFormComodo(tipo) {
  let html = '';

  // Dimensões
  html += `<p class="secao-label">Dimensões</p>`;
  html += `<div class="dimensoes-grid">`;
  html += campoDimensao(tipo, 'largura', 'Largura (m)');
  html += campoDimensao(tipo, 'comprimento', 'Comprimento (m)');
  html += `<div class="area-col">
    <div class="campo-grupo">
      <label>Área calculada</label>
      <div class="area-calc" id="area-${tipo.replace(/\s/g,'_')}">
        ${calcularArea(tipo)} <span>m²</span>
      </div>
    </div>
  </div>`;
  html += `</div>`;

  html += `<hr class="divisor">`;

  // Atributos comuns
  html += `<p class="secao-label">Atributos comuns</p>`;
  html += `<div class="campos-2col">`;
  dominios.atributos_comuns.forEach(attr => {
    html += campoAtributo(tipo, attr);
  });
  html += `</div>`;

  // Atributos específicos
  const especificos = dominios.atributos_especificos[tipo];
  if (especificos && especificos.length > 0) {
    html += `<hr class="divisor">`;
    html += `<p class="secao-label">Atributos específicos — ${tipo}</p>`;
    html += `<div class="campos-2col">`;
    especificos.forEach(attr => {
      html += campoAtributo(tipo, attr);
    });
    html += `</div>`;
  }

  return html;
}

function campoDimensao(tipo, campo, label) {
  const val = dadosComodos[tipo][campo] || '';
  const id = tipo.replace(/\s/g,'_');
  return `<div class="campo-grupo">
    <label>${label}</label>
    <input type="number" min="0" step="0.01" value="${val}" placeholder="0.00"
      oninput="salvarDado('${tipo}','${campo}',this.value); atualizarArea('${id}','${tipo}')">
  </div>`;
}

function campoAtributo(tipo, attr) {
  const val = dadosComodos[tipo][attr.id] || '';
  if (attr.tipo === 'select') {
    let opts = `<option value="">— selecione —</option>`;
    attr.opcoes.forEach(op => {
      opts += `<option value="${op}" ${val === op ? 'selected' : ''}>${op}</option>`;
    });
    return `<div class="campo-grupo">
      <label>${attr.label}</label>
      <div class="select-wrapper">
        <select onchange="salvarDado('${tipo}','${attr.id}',this.value); atualizarContador('${tipo}')">
          ${opts}
        </select>
      </div>
    </div>`;
  } else {
    return `<div class="campo-grupo">
      <label>${attr.label}</label>
      <input type="number" min="0" value="${val}" placeholder="0"
        oninput="salvarDado('${tipo}','${attr.id}',this.value); atualizarContador('${tipo}')">
    </div>`;
  }
}

// ── HELPERS ───────────────────────────────────────────────────
function salvarDado(tipo, campo, valor) {
  if (!dadosComodos[tipo]) dadosComodos[tipo] = {};
  dadosComodos[tipo][campo] = valor;
  atualizarBotao();
}

function atualizarArea(id, tipo) {
  const el = document.getElementById('area-' + id);
  if (el) el.innerHTML = calcularArea(tipo) + ' <span>m²</span>';
}

function calcularArea(tipo) {
  const d = dadosComodos[tipo] || {};
  const l = parseFloat(d.largura) || 0;
  const c = parseFloat(d.comprimento) || 0;
  return l && c ? (l * c).toFixed(2) : '—';
}

function atualizarContador(tipo) {
  const id = tipo.replace(/\s/g,'_');
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const pre = contarPreenchidos(tipo);
  const tot = contarTotal(tipo);
  const sub = card.querySelector('.card-subtitle');
  if (sub) sub.textContent = `${pre} de ${tot} campos preenchidos`;
  const badge = card.querySelector('.badge-ok');
  const headerRight = card.querySelector('.card-header > div:last-child');
  if (pre === tot && tot > 0) {
    if (!badge && headerRight) {
      const b = document.createElement('span');
      b.className = 'badge-ok';
      b.textContent = '✓ Completo';
      headerRight.insertBefore(b, headerRight.lastElementChild);
    }
  } else if (badge) badge.remove();
  atualizarBotao();
}

function contarTotal(tipo) {
  let n = 2; // largura + comprimento
  n += dominios.atributos_comuns.length;
  const esp = dominios.atributos_especificos[tipo];
  if (esp) n += esp.length;
  return n;
}

function contarPreenchidos(tipo) {
  const d = dadosComodos[tipo] || {};
  let n = 0;
  if (d.largura) n++;
  if (d.comprimento) n++;
  dominios.atributos_comuns.forEach(a => { if (d[a.id]) n++; });
  const esp = dominios.atributos_especificos[tipo];
  if (esp) esp.forEach(a => { if (d[a.id]) n++; });
  return n;
}

function toggleCard(tipo) {
  const id = tipo.replace(/\s/g,'_');
  const body = document.getElementById('body-' + id);
  const card = document.getElementById('card-' + id);
  const arrow = card.querySelector('.card-arrow');
  const aberto = body.classList.toggle('open');
  arrow.classList.toggle('open', aberto);
  dadosComodos[tipo]._aberto = aberto;
}

function atualizarBotao() {
  const btn = document.getElementById('btnExportar');
  const temDados = Object.keys(dadosComodos).length > 0;
  btn.disabled = !temDados;
}

// ── EXPORTAR EXCEL ────────────────────────────────────────────
function exportarExcel() {
  const linhas = [['Cômodo', 'Característica', 'Valor']];

  Object.keys(dadosComodos).forEach(tipo => {
    const d = dadosComodos[tipo];

    // Dimensões
    if (d.largura)      linhas.push([tipo, 'Largura (m)', d.largura]);
    if (d.comprimento)  linhas.push([tipo, 'Comprimento (m)', d.comprimento]);
    const area = calcularArea(tipo);
    if (area !== '—')   linhas.push([tipo, 'Área calculada (m²)', area]);

    // Atributos comuns
    dominios.atributos_comuns.forEach(attr => {
      if (d[attr.id]) linhas.push([tipo, attr.label, d[attr.id]]);
    });

    // Atributos específicos
    const esp = dominios.atributos_especificos[tipo];
    if (esp) esp.forEach(attr => {
      if (d[attr.id]) linhas.push([tipo, attr.label, d[attr.id]]);
    });
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(linhas);

  // Larguras das colunas
  ws['!cols'] = [{ wch: 18 }, { wch: 28 }, { wch: 28 }];

  // Estilo do cabeçalho
  ['A1','B1','C1'].forEach(cell => {
    if (ws[cell]) ws[cell].s = { font: { bold: true } };
  });

  XLSX.utils.book_append_sheet(wb, ws, 'Ficha');

  const data = new Date();
  const nome = `ficha_imovel_${data.getFullYear()}${String(data.getMonth()+1).padStart(2,'0')}${String(data.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb, nome);
}

// ── INIT ──────────────────────────────────────────────────────
carregarDominios();
</script>
</body>
</html>
